<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>GufoBox</title>

  <!-- PWA manifest e favicon -->
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="manifest" href="/manifest.json" />

  <!-- Tema e descrizione -->
  <meta name="theme-color" content="#6c63ff" />
  <meta name="description" content="Il tuo gufetto intelligente — musica, storie e avventure!" />

  <!-- Apple Home Screen -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GufoBox" />
  <link rel="apple-touch-icon" href="/icons/icon-192x192.svg" />

  <!-- Microsoft Tile -->
  <meta name="msapplication-TileColor" content="#1a1a2e" />
</head>
<body>
  <!-- Splash screen: rimosso da main.js al mount dell'app Vue -->
  <div id="splash-screen" style="
    position: fixed;
    inset: 0;
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: opacity 0.5s ease;
  ">
    <img src="/icons/icon-192x192.svg" alt="GufoBox" width="120" height="120" style="margin-bottom: 24px;" />
    <span style="color: #6c63ff; font-size: 2rem; font-family: sans-serif; font-weight: bold;">GufoBox</span>
    <span style="color: #aaaaaa; font-size: 0.95rem; font-family: sans-serif; margin-top: 8px;">Il tuo gufetto intelligente</span>
  </div>

  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
