<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Background circle -->
  <circle cx="96" cy="96" r="96" fill="#1a1a2e"/>
  <!-- Owl body -->
  <ellipse cx="96" cy="112" rx="44" ry="52" fill="#6c63ff"/>
  <!-- Owl head -->
  <circle cx="96" cy="72" r="36" fill="#6c63ff"/>
  <!-- Ear tufts -->
  <polygon points="72,42 64,20 80,38" fill="#4a3fcc"/>
  <polygon points="120,42 128,20 112,38" fill="#4a3fcc"/>
  <!-- Left eye white -->
  <circle cx="82" cy="70" r="14" fill="#ffffff"/>
  <!-- Right eye white -->
  <circle cx="110" cy="70" r="14" fill="#ffffff"/>
  <!-- Left eye pupil -->
  <circle cx="84" cy="70" r="8" fill="#1a1a2e"/>
  <!-- Right eye pupil -->
  <circle cx="112" cy="70" r="8" fill="#1a1a2e"/>
  <!-- Left eye shine -->
  <circle cx="87" cy="66" r="3" fill="#ffffff"/>
  <!-- Right eye shine -->
  <circle cx="115" cy="66" r="3" fill="#ffffff"/>
  <!-- Beak -->
  <polygon points="96,80 88,92 104,92" fill="#ffd27b"/>
  <!-- Wing left -->
  <ellipse cx="56" cy="116" rx="18" ry="30" fill="#4a3fcc" transform="rotate(-15 56 116)"/>
  <!-- Wing right -->
  <ellipse cx="136" cy="116" rx="18" ry="30" fill="#4a3fcc" transform="rotate(15 136 116)"/>
  <!-- Feet -->
  <line x1="80" y1="158" x2="72" y2="170" stroke="#ffd27b" stroke-width="4" stroke-linecap="round"/>
  <line x1="80" y1="158" x2="80" y2="172" stroke="#ffd27b" stroke-width="4" stroke-linecap="round"/>
  <line x1="80" y1="158" x2="88" y2="170" stroke="#ffd27b" stroke-width="4" stroke-linecap="round"/>
  <line x1="112" y1="158" x2="104" y2="170" stroke="#ffd27b" stroke-width="4" stroke-linecap="round"/>
  <line x1="112" y1="158" x2="112" y2="172" stroke="#ffd27b" stroke-width="4" stroke-linecap="round"/>
  <line x1="112" y1="158" x2="120" y2="170" stroke="#ffd27b" stroke-width="4" stroke-linecap="round"/>
</svg>
